server {
    listen 80;

    # Frontend - serve static SPA
    root /usr/share/nginx/html;  # path inside your frontend container build
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:3000/;  # trailing slash is required
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Optional: favicon and static assets (if needed)
    location = /favicon.ico {
        log_not_found off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        try_files $uri =404;
    }
}
